<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>☦️ 까라마조프 도장판</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1f3d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="까라마조프 도장">
<style>
:root {
  --bg:#f4f5fa; --bg1:#ffffff; --bg2:#f8f9fc; --bg3:#eef0f8;
  --border:#d8daea; --text:#1a1a2e; --text2:#44465a; --text3:#8890a8;
  --accent:#4a5db0; --accent2:#6070c8; --accent-light:#e8ebf8;
  --direct:#4a5db0; --proxy:#d96030; --milestone:#e8a010;
  --success:#2a8a4a; --danger:#cc4444;
  --shadow:0 2px 12px rgba(0,0,0,0.08); --radius:14px; --tab-h:64px;
}
[data-theme="dark"] {
  --bg:#12131e; --bg1:#1a1b2e; --bg2:#22233a; --bg3:#2a2b42;
  --border:#3a3c58; --text:#e8e8f8; --text2:#a8a8c8; --text3:#606888;
  --accent:#7080d8; --accent2:#8090e0; --accent-light:#1e2248;
  --direct:#6080e0; --proxy:#e08040; --milestone:#f0b030;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom))}
.page{display:none;padding:16px;max-width:600px;margin:0 auto}
.page.active{display:block}
.card{background:var(--bg1);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.sec{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;-webkit-appearance:none;box-sizing:border-box}
.fc{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);font-size:16px}
.fc:focus{outline:none;border-color:var(--accent)}
.btn{padding:11px 20px;border-radius:10px;font-size:15px;font-weight:700}
.btn-p{background:var(--accent);color:#fff;width:100%}
.btn-s{background:var(--bg3);color:var(--text2)}
.btn-d{background:var(--danger);color:#fff}

/* TAB BAR */
nav.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + env(safe-area-inset-bottom));background:var(--bg1);border-top:1px solid var(--border);display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;font-weight:600;color:var(--text3)}
.tb.active{color:var(--accent)}
.tb svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tb-add .add-circle{width:46px;height:46px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(74,93,176,.45)}
.tb-add .add-circle svg{stroke:#fff;width:24px;height:24px}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.hdr-title{font-size:20px;font-weight:800}
.theme-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px}

/* STAMP CARD VISUAL */
.sc-wrap{background:var(--bg1);border-radius:var(--radius);padding:18px 16px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.sc-wrap.is-current{border:2px solid var(--accent)}
.sc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sc-num{font-size:12px;font-weight:700;color:var(--text3)}
.sc-status-ok{font-size:12px;font-weight:700;color:var(--success)}
.sc-status-cur{font-size:12px;font-weight:700;color:var(--accent)}
.sc-slots{display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:10px}

/* Slots 1-4: circle */
.slot{width:50px;height:50px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.slot.empty{background:transparent;border:2.5px dashed var(--border)}
.slot.direct{background:var(--direct)}
.slot.proxy{background:var(--proxy)}
.slot .dbl{position:absolute;top:-5px;right:-5px;background:var(--milestone);color:#fff;font-size:9px;font-weight:900;border-radius:10px;padding:1px 4px;line-height:1.4}

/* Slot 5: star clip-path */
.slot-star{width:50px;height:50px;position:relative;display:flex;align-items:center;justify-content:center}
.slot-star .star-shape{width:50px;height:50px;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);display:flex;align-items:center;justify-content:center}
.slot-star.empty .star-shape{background:var(--border);opacity:.5}
.slot-star.direct .star-shape{background:var(--milestone)}
.slot-star.proxy .star-shape{background:var(--milestone)}
.slot-star .star-shape span{color:#fff;font-size:15px;font-weight:900;margin-top:6px}

/* Date labels under slots */
.sc-dates{display:flex;gap:10px;justify-content:center}
.sd{width:50px;text-align:center;font-size:9px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Benefit badge */
.b-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;margin-top:10px}
.b-polaroid{background:#fce8f0;color:#a0305a}
.b-osta{background:#e8f0ff;color:#304a90}
.b-ostb{background:#e8f5ea;color:#2a6a3a}

/* STATS */
.stats{display:flex;gap:8px;margin-bottom:12px}
.stat{flex:1;background:var(--bg1);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat .v{font-size:26px;font-weight:900;color:var(--accent)}
.stat .l{font-size:11px;color:var(--text3);margin-top:2px}

/* PROGRESS */
.prog{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:10px 0 2px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--direct),var(--accent2));border-radius:4px;transition:width .4s ease}

/* OVERLAY + SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;background:var(--bg1);border-radius:20px 20px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom));z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto}
.sheet.open{transform:translateY(0)}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:18px;font-weight:800;margin-bottom:18px}
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.tg{display:flex;gap:8px}
.tgb{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;color:var(--text3);text-align:center;background:var(--bg2);transition:all .15s}
.tgb.on{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.tgb.on-prx{border-color:var(--proxy);color:var(--proxy);background:#fdf0e8}
.tgb.on-dbl{border-color:var(--milestone);color:var(--milestone);background:#fef8e8}

/* BENEFIT MODAL */
.bm{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.65)}
.bm.open{display:flex}
.bm-box{background:var(--bg1);border-radius:20px;padding:24px;width:100%;max-width:360px}
.bm-box h2{font-size:20px;font-weight:900;text-align:center;margin-bottom:6px}
.bm-box .sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:20px}
.bm-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;border:2px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.bm-opt:active{transform:scale(.98)}
.bm-opt.po:hover,.bm-opt.po:focus{border-color:#a0305a;background:#fce8f0}
.bm-opt.oa:hover,.bm-opt.oa:focus{border-color:#304a90;background:#e8f0ff}
.bm-opt.ob:hover,.bm-opt.ob:focus{border-color:#2a6a3a;background:#e8f5ea}
.bm-opt .ico{font-size:26px}
.bm-opt .nm{font-weight:700;font-size:15px}
.bm-opt .ds{font-size:12px;color:var(--text3);margin-top:2px}

/* SCHEDULE */
.sc-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.sc-item:last-child{border-bottom:none}
.sc-dt{min-width:72px;font-size:13px;font-weight:700}
.sc-cast{font-size:12px;color:var(--text3);flex:1;line-height:1.5}
.dbl-tag{background:var(--milestone);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;white-space:nowrap}

/* RECOMMEND */
.rec-hero{background:linear-gradient(135deg,#1e2d70,#2a4090);color:#fff;border-radius:var(--radius);padding:22px;margin-bottom:12px}
.rec-lbl{font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.rec-big{font-size:42px;font-weight:900;line-height:1;margin-bottom:6px}
.rec-txt{font-size:13px;opacity:.85}
.rec-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.rec-item:last-child{border-bottom:none}
.rec-dt{min-width:80px;font-size:13px;font-weight:700}
.rec-detail{font-size:12px;color:var(--text3);flex:1}
.rec-gain{font-size:13px;font-weight:800;color:var(--accent)}
.rec-done{font-size:11px;font-weight:700;color:var(--success)}

/* STAMP ENTRY ROW */
.se-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
.se-row:last-child{border-bottom:none}
.se-type{font-size:11px;font-weight:800;min-width:48px}
.se-date{font-size:12px;color:var(--text2)}
.se-del{color:var(--text3);font-size:16px;margin-left:auto;padding:4px 8px}

/* Empty state */
.empty-state{text-align:center;padding:40px 16px;color:var(--text3)}
.empty-state .ico{font-size:48px;margin-bottom:12px}
.empty-state .msg{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-state .sub{font-size:13px}
</style>
</head>
<body>

<!-- PAGES -->
<div id="p-home" class="page active">
  <div class="hdr">
    <div class="hdr-title">☦️ 도장판</div>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="테마 변경">🌙</button>
  </div>
  <div id="home-body"></div>
</div>

<div id="p-cards" class="page">
  <div class="hdr"><div class="hdr-title">내 도장판</div></div>
  <div id="cards-body"></div>
</div>

<div id="p-schedule" class="page">
  <div class="hdr"><div class="hdr-title">공연 일정</div></div>
  <div id="schedule-body"></div>
</div>

<div id="p-rec" class="page">
  <div class="hdr"><div class="hdr-title">혜택 추천</div></div>
  <div id="rec-body"></div>
</div>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tb active" id="tb-home" onclick="goPage('home',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>홈
  </button>
  <button class="tb" id="tb-cards" onclick="goPage('cards',this)">
    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 10h4M8 14h8"/></svg>도장판
  </button>
  <button class="tb tb-add" onclick="openSheet()">
    <div class="add-circle"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
  </button>
  <button class="tb" id="tb-schedule" onclick="goPage('schedule',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>일정
  </button>
  <button class="tb" id="tb-rec" onclick="goPage('rec',this)">
    <svg viewBox="0 0 24 24"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>추천
  </button>
</nav>

<!-- ADD SHEET -->
<div class="overlay" id="add-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="add-sheet">
  <div class="handle"></div>
  <div class="sheet-title">도장 추가</div>

  <div class="fg">
    <label class="fl">날짜</label>
    <input type="date" class="fc" id="inp-date">
  </div>

  <div class="fg">
    <label class="fl">종류</label>
    <div class="tg">
      <button class="tgb on" id="t-direct" onclick="setType('direct')">직관</button>
      <button class="tgb" id="t-proxy" onclick="setType('proxy')">타인 도장</button>
    </div>
  </div>

  <div class="fg">
    <label class="fl">더블적립 이벤트</label>
    <div class="tg">
      <button class="tgb on" id="d-no" onclick="setDbl(false)">아니오 (×1)</button>
      <button class="tgb" id="d-yes" onclick="setDbl(true)">예 (×2)</button>
    </div>
  </div>

  <div class="fg">
    <label class="fl">공연 연결 <span style="font-weight:400;color:var(--text3)">(선택)</span></label>
    <select class="fc" id="inp-show"></select>
  </div>

  <div class="fg">
    <label class="fl">메모 <span style="font-weight:400;color:var(--text3)">(선택)</span></label>
    <input type="text" class="fc" id="inp-notes" placeholder="좌석, 감상 등">
  </div>

  <div id="add-preview" style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:var(--text2)"></div>

  <button class="btn btn-p" onclick="submitStamp()">도장 추가하기</button>
</div>

<!-- BENEFIT MODAL -->
<div class="bm" id="bm">
  <div class="bm-box">
    <div style="text-align:center;font-size:40px;margin-bottom:8px">🎉</div>
    <h2>5도장 완성!</h2>
    <div class="sub">받을 혜택을 선택해주세요</div>
    <div class="bm-opt po" onclick="chooseBenefit('polaroid')">
      <span class="ico">📸</span>
      <div><div class="nm">배우 폴라로이드 교환권</div><div class="ds">피아니스트 제외 출연진 22명 중 선택</div></div>
    </div>
    <div class="bm-opt oa" onclick="chooseBenefit('ost_a')">
      <span class="ico">💿</span>
      <div><div class="nm">OST A버전</div><div class="ds">브라더스 까라마조프 공식 OST</div></div>
    </div>
    <div class="bm-opt ob" onclick="chooseBenefit('ost_b')">
      <span class="ico">💽</span>
      <div><div class="nm">OST B버전</div><div class="ds">브라더스 까라마조프 공식 OST</div></div>
    </div>
  </div>
</div>

<script>
/* ── CONSTANTS ─────────────────────────────────── */
const STORE = 'bk-stamp-v1';
const B_LABEL = { polaroid:'📸 폴라로이드', ost_a:'💿 OST A', ost_b:'💽 OST B' };
const B_CLS   = { polaroid:'b-polaroid', ost_a:'b-osta', ost_b:'b-ostb' };
const DOW     = ['일','월','화','수','목','금','토'];

/* ── STATE ─────────────────────────────────────── */
let S = { cards:[], dblEvents:[] };
let sched = [];
let pendingCard = null;
let addType = 'direct';
let addDbl  = false;

/* ── PERSISTENCE ───────────────────────────────── */
function save(){ localStorage.setItem(STORE, JSON.stringify(S)); }
function load(){
  try { const d = localStorage.getItem(STORE); if(d) S = JSON.parse(d); } catch(e){}
  S.cards    = S.cards    || [];
  S.dblEvents= S.dblEvents|| [];
}

/* ── CARD LOGIC ────────────────────────────────── */
function cardTotal(c){ return c.stamps.reduce((n,s)=>n+s.count,0); }
function activeCard(){ return S.cards.find(c=>!c.benefit); }
function newCard(){ return {id:Date.now()+Math.random(), stamps:[], benefit:null, completedAt:null}; }

function addStamps(date, type, count, showRef, notes){
  let left = count;
  while(left > 0){
    let card = activeCard();
    if(!card){ card = newCard(); S.cards.push(card); }
    const space = 5 - cardTotal(card);
    const adding = Math.min(left, space);
    card.stamps.push({ id:Date.now()+Math.random(), date, type, count:adding, showRef:showRef||null, notes:notes||'' });
    left -= adding;
    if(cardTotal(card) >= 5){
      card.completedAt = date;
      pendingCard = card.id;
    }
  }
  save();
  if(pendingCard){ openBM(); }
  renderAll();
}

function chooseBenefit(b){
  const c = S.cards.find(x=>x.id===pendingCard);
  if(c) c.benefit = b;
  pendingCard = null;
  document.getElementById('bm').classList.remove('open');
  save();
  renderAll();
}

function delStamp(cardId, stampId){
  const c = S.cards.find(x=>x.id==cardId);
  if(!c || !confirm('이 도장을 삭제할까요?')) return;
  c.stamps = c.stamps.filter(s=>s.id!=stampId);
  if(c.benefit && cardTotal(c)<5) c.benefit = null;
  if(c.stamps.length===0 && !c.benefit) S.cards = S.cards.filter(x=>x.id!=cardId);
  save(); renderAll();
}

/* ── STAMP CARD HTML ───────────────────────────── */
function slotHTML(pos, card){
  const total = cardTotal(card);
  const filled = pos <= total;
  let st = null, isLastOfEntry = false;
  let run = 0;
  for(const s of card.stamps){
    if(pos > run && pos <= run + s.count){
      st = s;
      isLastOfEntry = (pos === run + s.count);
      break;
    }
    run += s.count;
  }
  const type = (st && filled) ? st.type : '';
  const showDbl = filled && st && st.count===2 && isLastOfEntry;

  if(pos < 5){
    return `<div class="slot ${filled ? type : 'empty'}">${showDbl?'<span class="dbl">×2</span>':''}</div>`;
  } else {
    return `<div class="slot-star ${filled ? type : 'empty'}"><div class="star-shape"><span>${filled?'★':''}</span></div>${showDbl?'<span class="dbl" style="position:absolute;top:-5px;right:-5px">×2</span>':''}</div>`;
  }
}

function stampDateAt(card, pos){
  let run = 0;
  for(const s of card.stamps){
    if(pos > run && pos <= run + s.count){
      const d = new Date(s.date);
      return `${d.getMonth()+1}/${d.getDate()}`;
    }
    run += s.count;
  }
  return '';
}

function cardHTML(card, idx, detail){
  const total = cardTotal(card);
  const done  = !!card.benefit;
  const isCur = !done && S.cards[S.cards.length-1]?.id === card.id;

  const slots = [1,2,3,4,5].map(p=>slotHTML(p,card)).join('');
  const dates = [1,2,3,4,5].map(p=>`<div class="sd">${stampDateAt(card,p)}</div>`).join('');

  const statusHTML = done
    ? `<span class="sc-status-ok">✓ 완성</span>`
    : `<span class="sc-status-cur">${total}/5</span>`;

  const benefitHTML = done
    ? `<div><span class="b-badge ${B_CLS[card.benefit]}">${B_LABEL[card.benefit]}</span></div>`
    : total < 5
    ? `<div style="margin-top:8px;font-size:12px;color:var(--text3)">다음 혜택까지 <strong>${5-total}개</strong> 더!</div>`
    : '';

  let detailHTML = '';
  if(detail && card.stamps.length > 0){
    const rows = card.stamps.map(s=>{
      const d = new Date(s.date);
      const lbl = s.type==='direct'?'직관':'타인';
      const col = s.type==='direct'?'var(--direct)':'var(--proxy)';
      return `<div class="se-row">
        <span class="se-type" style="color:${col}">${lbl}</span>
        <span class="se-date">${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})</span>
        ${s.count===2?'<span class="dbl-tag">×2</span>':''}
        ${s.notes?`<span style="font-size:11px;color:var(--text3);flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.notes}</span>`:''}
        <button class="se-del" onclick="delStamp('${card.id}','${s.id}')">✕</button>
      </div>`;
    }).join('');
    detailHTML = `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:2px">${rows}</div>`;
  }

  return `
    <div class="sc-wrap${isCur?' is-current':''}">
      <div class="sc-head">
        <div class="sc-num">도장판 #${idx+1}${isCur?' · 현재':''}</div>
        ${statusHTML}
      </div>
      <div class="sc-slots">${slots}</div>
      <div class="sc-dates">${dates}</div>
      ${benefitHTML}
      ${detailHTML}
    </div>`;
}

/* ── RENDER ────────────────────────────────────── */
function renderAll(){ renderHome(); renderCards(); renderSchedule(); renderRec(); }

function renderHome(){
  const done   = S.cards.filter(c=>c.benefit);
  const cur    = activeCard();
  const curTot = cur ? cardTotal(cur) : 0;
  const allSt  = S.cards.flatMap(c=>c.stamps);
  const direct = allSt.filter(s=>s.type==='direct').reduce((n,s)=>n+s.count,0);
  const proxy  = allSt.filter(s=>s.type==='proxy').reduce((n,s)=>n+s.count,0);

  let h = '';
  if(!cur && S.cards.length===0){
    h = `<div class="empty-state"><div class="ico">☦️</div><div class="msg">아직 도장이 없어요</div><div class="sub">아래 + 버튼으로 첫 도장을 추가해보세요</div></div>`;
  } else {
    if(cur){
      h += `<div class="card"><div class="sec">현재 도장판</div>${cardHTML(cur,S.cards.indexOf(cur),false)}
        <div class="prog"><div class="prog-fill" style="width:${curTot/5*100}%"></div></div>
      </div>`;
    } else {
      h += `<div class="card" style="text-align:center;padding:20px"><div style="font-size:14px;font-weight:700;color:var(--success)">✓ 모든 도장판 완성!</div><div style="font-size:12px;color:var(--text3);margin-top:4px">+ 버튼으로 새 도장판을 시작해요</div></div>`;
    }
    h += `<div class="stats">
      <div class="stat"><div class="v">${done.length}</div><div class="l">완성 카드</div></div>
      <div class="stat"><div class="v">${direct}</div><div class="l">직관</div></div>
      <div class="stat"><div class="v">${proxy}</div><div class="l">타인 도장</div></div>
    </div>`;
    if(done.length){
      const pol = done.filter(c=>c.benefit==='polaroid').length;
      const oa  = done.filter(c=>c.benefit==='ost_a').length;
      const ob  = done.filter(c=>c.benefit==='ost_b').length;
      h += `<div class="card"><div class="sec">받은 혜택</div>`;
      if(pol) h += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span>📸 폴라로이드 교환권</span><strong style="color:var(--accent)">${pol}개</strong></div>`;
      if(oa)  h += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)"><span>💿 OST A버전</span><strong style="color:var(--accent)">${oa}개</strong></div>`;
      if(ob)  h += `<div style="display:flex;justify-content:space-between;padding:7px 0"><span>💽 OST B버전</span><strong style="color:var(--accent)">${ob}개</strong></div>`;
      h += `</div>`;
    }
  }
  document.getElementById('home-body').innerHTML = h;
}

function renderCards(){
  const rev = [...S.cards].reverse();
  let h = '';
  if(!rev.length){
    h = `<div class="empty-state"><div class="ico">🃏</div><div class="msg">도장판이 없어요</div><div class="sub">+ 버튼으로 첫 도장을 추가해요</div></div>`;
  } else {
    rev.forEach((card,ri)=>{
      const oi = S.cards.length-1-ri;
      h += cardHTML(card,oi,true) + '<div style="height:4px"></div>';
    });
  }
  document.getElementById('cards-body').innerHTML = h;
}

function renderSchedule(){
  const today = new Date().toISOString().slice(0,10);
  const up = sched.filter(s=>s.date>=today);

  let h = '';

  // Double events manager
  h += `<div class="card"><div class="sec">더블적립 이벤트 날짜</div>`;
  if(S.dblEvents.length){
    h += S.dblEvents.map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px">${fmtDate(e)}</span>
      <button onclick="removeDbl('${e}')" style="color:var(--text3);font-size:14px;padding:4px 8px">✕</button>
    </div>`).join('');
  } else {
    h += `<div style="font-size:13px;color:var(--text3);padding:4px 0">등록된 날짜가 없어요</div>`;
  }
  h += `<div style="display:flex;gap:8px;margin-top:10px">
    <input type="date" class="fc" id="new-dbl" style="flex:1">
    <button class="btn btn-s" onclick="addDbl()" style="white-space:nowrap">추가</button>
  </div></div>`;

  // Upcoming schedule
  if(up.length){
    h += `<div class="card"><div class="sec">예정 공연 (${up.length}회)</div>`;
    up.slice(0,30).forEach(s=>{
      const isDbl = S.dblEvents.includes(s.date);
      h += `<div class="sc-item">
        <div class="sc-dt">${s.date.slice(5)}<br><span style="font-size:11px;color:var(--text3)">${DOW[new Date(s.date).getDay()]} ${s.time}</span></div>
        <div class="sc-cast">${s.fyodor} · ${s.dmitri}<br>${s.ivan} · ${s.alyosha}</div>
        ${isDbl?'<span class="dbl-tag">더블</span>':''}
      </div>`;
    });
    if(up.length>30) h += `<div style="text-align:center;font-size:12px;color:var(--text3);padding-top:8px">+${up.length-30}회 더</div>`;
    h += `</div>`;
  }

  document.getElementById('schedule-body').innerHTML = h;
}

function renderRec(){
  const cur    = activeCard();
  const curTot = cur ? cardTotal(cur) : 0;
  const need   = cur ? 5 - curTot : 0;
  const today  = new Date().toISOString().slice(0,10);
  const up     = sched.filter(s=>s.date>=today).slice(0,12);

  let h = `<div class="rec-hero">
    <div class="rec-lbl">현재 도장</div>
    <div class="rec-big">${curTot}<span style="font-size:22px;opacity:.7"> / 5</span></div>
    <div class="rec-txt">${cur ? `다음 혜택까지 <strong>${need}개</strong> 더 필요해요` : '도장판을 시작해보세요'}</div>
  </div>`;

  if(cur && need > 0){
    const dblUp = up.filter(s=>S.dblEvents.includes(s.date));
    h += `<div class="card"><div class="sec">추천 전략</div>`;
    h += `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:700;font-size:14px">일반 관람</div>
      <div style="font-size:13px;color:var(--text3);margin-top:3px"><strong style="color:var(--text)">${need}회</strong> 더 관람하면 완성</div>
    </div>`;
    if(dblUp.length){
      const needDbl = Math.ceil(need/2);
      h += `<div style="padding:10px 0">
        <div style="font-weight:700;font-size:14px">더블적립 이벤트 이용 시 <span class="dbl-tag">×2</span></div>
        <div style="font-size:13px;color:var(--text3);margin-top:3px">단 <strong style="color:var(--text)">${needDbl}회</strong>만 관람해도 완성 가능!</div>
      </div>`;
    }
    h += `</div>`;

    if(up.length){
      h += `<div class="card"><div class="sec">공연별 예상 도장</div>`;
      let running = curTot;
      up.forEach(s=>{
        if(running >= 5) return;
        const isDbl = S.dblEvents.includes(s.date);
        const gain  = isDbl ? 2 : 1;
        const after = Math.min(running + gain, 5);
        const completes = after >= 5 && running < 5;
        running = after >= 5 ? 5 : after;
        h += `<div class="rec-item">
          <div class="rec-dt">${s.date.slice(5)}<br><span style="font-size:11px;color:var(--text3)">${DOW[new Date(s.date).getDay()]} ${s.time}</span></div>
          <div class="rec-detail">${s.fyodor} · ${s.dmitri}</div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
            ${isDbl?'<span class="dbl-tag">더블</span>':''}
            <span class="rec-gain">+${gain}</span>
            ${completes?'<span class="rec-done">✓ 완성!</span>':''}
          </div>
        </div>`;
      });
      h += `</div>`;
    }
  } else if(!cur){
    h += `<div class="card" style="text-align:center;padding:20px;color:var(--text3)">+ 버튼으로 도장을 추가해보세요</div>`;
  } else {
    h += `<div class="card" style="text-align:center;padding:20px"><div style="font-size:14px;font-weight:700;color:var(--success)">✓ 도장판 완성!</div><div style="font-size:12px;color:var(--text3);margin-top:4px">혜택을 선택해주세요</div></div>`;
  }

  document.getElementById('rec-body').innerHTML = h;
}

/* ── SHEET ─────────────────────────────────────── */
function openSheet(){
  document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);
  setType('direct'); setDbl(false);
  document.getElementById('inp-notes').value = '';
  populateShows();
  updatePreview();
  document.getElementById('add-overlay').classList.add('open');
  document.getElementById('add-sheet').classList.add('open');
}
function closeSheet(){
  document.getElementById('add-overlay').classList.remove('open');
  document.getElementById('add-sheet').classList.remove('open');
}
function setType(t){
  addType = t;
  document.getElementById('t-direct').className = 'tgb' + (t==='direct'?' on':'');
  document.getElementById('t-proxy').className  = 'tgb' + (t==='proxy'?' on on-prx':'');
  updatePreview();
}
function setDbl(d){
  addDbl = d;
  document.getElementById('d-no').className  = 'tgb' + (!d?' on':'');
  document.getElementById('d-yes').className = 'tgb' + (d?' on on-dbl':'');
  updatePreview();
}
function updatePreview(){
  const cur = activeCard();
  const curTot = cur ? cardTotal(cur) : 0;
  const count = addDbl ? 2 : 1;
  const after = curTot + count;
  const typeLabel = addType==='direct'?'직관':'타인 도장';
  const el = document.getElementById('add-preview');
  if(!el) return;
  let msg = `${typeLabel} · ${addDbl?'×2 더블적립':'×1'} → `;
  if(!cur && curTot===0){
    msg += `새 도장판 시작, ${count}/5`;
  } else if(after >= 5){
    msg += `<strong style="color:var(--success)">도장판 완성!</strong>`;
    if(after > 5) msg += ` (+${after-5}개는 다음 도장판으로)`;
  } else {
    msg += `${after}/5`;
  }
  el.innerHTML = msg;
}

function populateShows(){
  const sel = document.getElementById('inp-show');
  const d   = document.getElementById('inp-date').value || new Date().toISOString().slice(0,10);
  sel.innerHTML = '<option value="">선택 안함</option>';
  sched.filter(s=>s.date>=d).slice(0,20).forEach(s=>{
    const opt = document.createElement('option');
    opt.value = `${s.date}_${s.time}`;
    opt.textContent = `${s.date.slice(5)} (${DOW[new Date(s.date).getDay()]}) ${s.time} - ${s.fyodor}·${s.dmitri}·${s.ivan}`;
    sel.appendChild(opt);
  });
}

function submitStamp(){
  const date = document.getElementById('inp-date').value;
  if(!date){ alert('날짜를 선택해주세요'); return; }
  const count = addDbl ? 2 : 1;
  const showRef = document.getElementById('inp-show').value || null;
  const notes = document.getElementById('inp-notes').value.trim();
  closeSheet();
  addStamps(date, addType, count, showRef, notes);
}

/* ── BENEFIT MODAL ─────────────────────────────── */
function openBM(){ document.getElementById('bm').classList.add('open'); }

/* ── DOUBLE EVENTS ─────────────────────────────── */
function addDbl(){
  const d = document.getElementById('new-dbl').value;
  if(!d || S.dblEvents.includes(d)) return;
  S.dblEvents.push(d); S.dblEvents.sort();
  save(); renderSchedule(); renderRec();
}
function removeDbl(d){
  S.dblEvents = S.dblEvents.filter(e=>e!==d);
  save(); renderSchedule(); renderRec();
}

/* ── NAVIGATION ────────────────────────────────── */
function goPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

/* ── THEME ─────────────────────────────────────── */
function toggleTheme(){
  const next = document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('bk-theme', next);
}

/* ── UTILS ─────────────────────────────────────── */
function fmtDate(d){
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()} (${DOW[dt.getDay()]})`;
}

/* ── INIT ──────────────────────────────────────── */
async function init(){
  const theme = localStorage.getItem('bk-theme');
  if(theme) document.documentElement.dataset.theme = theme;
  load();
  try { sched = await fetch('schedule.json').then(r=>r.json()); } catch(e){ sched=[]; }
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  renderAll();
}
init();
</script>
</body>
</html>
